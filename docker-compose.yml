services:
  postgres:
    image: postgres:16
    container_name: notification-postgres
    environment:
      POSTGRES_DB: notifications
      POSTGRES_USER: notifications
      POSTGRES_PASSWORD: notifications
    # Host port is 5433 to avoid colliding with a native Postgres on 5432.
    ports:
      - "5433:5432"
    volumes:
      - notification-pgdata:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: notification-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      # AMQP protocol port
      - "5672:5672"
      # Management UI: http://localhost:15672 (guest/guest)
      - "15672:15672"
    volumes:
      - notification-rabbitmq:/var/lib/rabbitmq

volumes:
  notification-pgdata:
  notification-rabbitmq:
