# Test configuration: in-memory H2 so the suite runs without Postgres/Docker.
spring:
  datasource:
    url: jdbc:h2:mem:notifications;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
